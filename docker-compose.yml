name: laverie-nails

services:
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
      target: php-fpm
    image: laverie-nails/php-fpm:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/data/database.sqlite
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - sqlite_data:/var/www/data
      - runtime_storage:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
      - public_uploads:/var/www/html/storage/app/public
    networks:
      - laverie
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    image: laverie-nails/nginx:${APP_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      php-fpm:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m,mode=0755
      - /var/run:size=8m,mode=0755
    volumes:
      - public_uploads:/var/www/html/storage/app/public:ro
    networks:
      - laverie
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  laverie:
    driver: bridge

volumes:
  sqlite_data:
  runtime_storage:
  bootstrap_cache:
  public_uploads: